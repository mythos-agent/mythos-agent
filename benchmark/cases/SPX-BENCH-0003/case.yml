notes: |
  The express-session middleware is configured without `httpOnly: true`
  or `secure: true` on its cookie object. That means:

  * Any XSS on the origin can read document.cookie and exfiltrate the
    session id — so the session serves as the attacker's long-term
    foothold rather than the single-page compromise XSS otherwise is.
  * The cookie is transmitted over cleartext HTTP if the user ever
    lands on one, making it trivially interceptable on shared Wi-Fi
    or in an on-path attacker position.

  The canonical fix sets both flags (and sameSite=strict or lax for
  CSRF defense). The safe fixture demonstrates the full remediation.

  Triggers session-scanner rule `session-insecure-cookie`. This is
  CWE-614, covered by OWASP's HttpOnly guidance.
