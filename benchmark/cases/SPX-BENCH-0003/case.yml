id: SPX-BENCH-0003
title: Express session cookie missing HttpOnly and Secure flags
cwe: CWE-614 # Sensitive Cookie in HTTPS Session Without 'Secure' Attribute
severity: high
languages:
  - typescript
  - javascript
classes:
  - session-management
  - cookie-flags
  - xss-token-theft
  - csrf
sources:
