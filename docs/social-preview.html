<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>sphinx-agent Social Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .preview {
    width: 1280px;
    height: 640px;
    background: linear-gradient(135deg, #0a0a0f 0%, #0f172a 50%, #0a0a0f 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Subtle grid background */
  .preview::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(96, 165, 250, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(96, 165, 250, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Glow orbs */
  .glow-1 {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(96, 165, 250, 0.12) 0%, transparent 70%);
    top: -100px;
    right: -50px;
    border-radius: 50%;
  }
  .glow-2 {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(147, 51, 234, 0.1) 0%, transparent 70%);
    bottom: -80px;
    left: -30px;
    border-radius: 50%;
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
  }

  /* Sphinx icon */
  .icon {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }

  .shield {
    width: 80px;
    height: 90px;
    position: relative;
  }

  .shield svg {
    width: 100%;
    height: 100%;
  }

  .title {
    font-size: 64px;
    font-weight: 800;
    color: #f8fafc;
    letter-spacing: -2px;
    margin-bottom: 8px;
  }

  .title span {
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 22px;
    color: #94a3b8;
    margin-bottom: 40px;
    font-weight: 400;
  }

  .stats {
    display: flex;
    gap: 48px;
    margin-bottom: 36px;
  }

  .stat {
    text-align: center;
  }

  .stat-number {
    font-size: 36px;
    font-weight: 800;
    color: #f8fafc;
  }

  .stat-number.cyan { color: #60a5fa; }
  .stat-number.purple { color: #a78bfa; }
  .stat-number.green { color: #4ade80; }
  .stat-number.orange { color: #fb923c; }

  .stat-label {
    font-size: 13px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }

  .command {
    background: rgba(30, 41, 59, 0.8);
    border: 1px solid rgba(51, 65, 85, 0.5);
    border-radius: 8px;
    padding: 12px 32px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 18px;
    color: #94a3b8;
    display: inline-block;
  }

  .command .prompt { color: #4ade80; }
  .command .cmd { color: #f8fafc; }

  .badge {
    position: absolute;
    bottom: 24px;
    right: 32px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #475569;
    font-size: 14px;
  }

  .badge-mit {
    background: rgba(30, 41, 59, 0.8);
    border: 1px solid #334155;
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 12px;
    color: #60a5fa;
    font-weight: 600;
  }

  .oss-label {
    position: absolute;
    top: 24px;
    left: 32px;
    color: #4ade80;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .mythos-label {
    position: absolute;
    top: 24px;
    right: 32px;
    color: #475569;
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="preview">
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="oss-label">Open Source</div>
  <div class="mythos-label">Mythos for everyone</div>

  <div class="content">
    <div class="icon">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
        <!-- Shield shape -->
        <path d="M36 4L8 16v20c0 17.6 11.9 34 28 38 16.1-4 28-20.4 28-38V16L36 4z" fill="none" stroke="url(#shieldGrad)" stroke-width="2.5"/>
        <!-- Eye / scan lines -->
        <circle cx="36" cy="34" r="12" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.6"/>
        <circle cx="36" cy="34" r="5" fill="#60a5fa" opacity="0.8"/>
        <line x1="24" y1="34" x2="16" y2="34" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
        <line x1="48" y1="34" x2="56" y2="34" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
        <line x1="36" y1="22" x2="36" y2="14" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
        <line x1="36" y1="46" x2="36" y2="54" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
        <!-- Diagonal scan lines -->
        <line x1="27.5" y1="25.5" x2="22" y2="20" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
        <line x1="44.5" y1="25.5" x2="50" y2="20" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
        <line x1="27.5" y1="42.5" x2="22" y2="48" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
        <line x1="44.5" y1="42.5" x2="50" y2="48" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
        <defs>
          <linearGradient id="shieldGrad" x1="8" y1="4" x2="64" y2="62">
            <stop offset="0%" stop-color="#60a5fa"/>
            <stop offset="100%" stop-color="#a78bfa"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <div class="title"><span>sphinx-agent</span></div>
    <div class="tagline">The AI security agent that guards your code</div>

    <div class="stats">
      <div class="stat">
        <div class="stat-number cyan">49</div>
        <div class="stat-label">Scanners</div>
      </div>
      <div class="stat">
        <div class="stat-number purple">329+</div>
        <div class="stat-label">Rules</div>
      </div>
      <div class="stat">
        <div class="stat-number green">58</div>
        <div class="stat-label">Commands</div>
      </div>
      <div class="stat">
        <div class="stat-number orange">8</div>
        <div class="stat-label">Languages</div>
      </div>
    </div>

    <div class="command">
      <span class="prompt">$</span> <span class="cmd">npx sphinx-agent scan</span>
    </div>
  </div>

  <div class="badge">
    <span class="badge-mit">MIT</span>
    TypeScript · 25K lines
  </div>
</div>

</body>
</html>
