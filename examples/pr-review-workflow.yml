# Example: Add as .github/workflows/mythos-agent-pr-review.yml
name: mythos-agent PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  security-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pattern-only review (free, no API key)
      - uses: mythos-agent/mythos-agent/action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on: critical

      # Full AI review (requires Anthropic API key)
      # - uses: mythos-agent/mythos-agent/action@main
      #   with:
      #     github-token: ${{ secrets.GITHUB_TOKEN }}
      #     api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      #     fail-on: high
