# Funding options for sphinx-agent.
#
# This file enables the "Sponsor" button on the GitHub repo page. GitHub's
# verification rejects handles that don't have an active sponsor profile, so
# uncomment a line ONLY after the corresponding profile is live.
#
# Activation order (per docs/sustainability/funding.md):
#   1. Create GitHub Sponsors profile at https://github.com/sponsors → uncomment `github:`
#   2. Apply Open Collective via Open Source Collective fiscal host →
#      uncomment `open_collective:` once the collective is approved
#   3. (Optional) custom URL once sphinx-agent.dev/sponsor is live

# github: [zhijiewong]
# open_collective: sphinx-agent
# custom: ["https://sphinx-agent.dev/sponsor"]
