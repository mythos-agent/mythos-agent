name: Feature Request
description: Suggest a new feature or scanner
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for sphinx-agent? We'd love to hear it!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like to see?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this solve? How would you use it?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried other approaches or tools?

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New scanner / rules
        - New CLI command
        - Integration (VS Code, GitHub, CI/CD)
        - Performance
        - Documentation
        - Other
