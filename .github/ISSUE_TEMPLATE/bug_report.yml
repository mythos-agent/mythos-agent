name: Bug Report
description: Report a bug in mythos-agent
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: "When I run mythos-agent scan, it..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      value: |
        1. Run `mythos-agent ...`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Output
      description: Paste the error message or stack trace
      render: shell

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js Version
      placeholder: "22.0.0"

  - type: input
    id: version
    attributes:
      label: mythos-agent Version
      placeholder: "2.0.0"
    validations:
      required: true
