name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm:
    needs: release-please
    if: needs.release-please.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org/"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # `--provenance` requires a public GitHub source repository — npm
      # rejects provenance bundles from private repos with E422. The flag
      # is auto-enabled on `push` events once the repository flips to
      # public; until then, sigstore-release.yml provides cosign keyless
      # attestation that works regardless of visibility.
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM }}
          PROVENANCE_FLAG: ${{ github.event.repository.visibility == 'public' && '--provenance' || '' }}
        run: npm publish --access public $PROVENANCE_FLAG
