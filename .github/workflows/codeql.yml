name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly run on Mondays at 07:00 UTC
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    # CodeQL SARIF upload requires GitHub Advanced Security, which is a
    # paid feature on private repos. Skip the whole job while the repo is
    # private — the analysis runs but has nowhere to publish, so it just
    # creates noise in the Actions log. Auto-re-enables when repo flips
    # to public. Tracked in docs/security/threat-model.md § S4.
    if: github.event.repository.visibility == 'public'
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
