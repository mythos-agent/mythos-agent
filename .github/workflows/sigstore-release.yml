name: Sigstore Release Signing

# Signs every published release with cosign keyless signatures and uploads
# the signature, certificate, and SLSA L3 build provenance attestation.
# Triggered by release-please when a new release is created.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sign (e.g. v2.1.0)"
        required: true
        type: string

permissions:
  contents: write       # upload assets to the release
  id-token: write       # OIDC for keyless cosign signing + SLSA provenance
  attestations: write   # SLSA build provenance attestations

jobs:
  sign-and-attest:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2
        with:
          # Audit-first stance; flip to `block` with an explicit endpoint
          # allowlist once a run baseline is captured. See docs/security/
          # threat-model.md § S4.
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack npm tarball
        id: pack
        run: |
          TARBALL=$(npm pack --silent)
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          sha256sum "${TARBALL}" > "${TARBALL}.sha256"

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
        with:
          cosign-release: "v2.4.1"

      - name: Sign tarball with cosign (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob \
            --yes \
            --output-signature "${{ steps.pack.outputs.tarball }}.sig" \
            --output-certificate "${{ steps.pack.outputs.tarball }}.crt" \
            "${{ steps.pack.outputs.tarball }}"

      - name: Generate SLSA L3 build provenance attestation
        # actions/attest-build-provenance requires a public repo (or a paid
        # GitHub plan) — "Feature not available for user-owned private
        # repositories." The cosign signature above gives us keyless
        # provenance even without this; we tolerate the failure here so the
        # workflow keeps producing usable artifacts during the stealth
        # period. Once the repo is public, this step starts succeeding and
        # ships SLSA L3 attestations alongside the cosign signatures.
        continue-on-error: true
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Upload signed artifacts to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            ${{ steps.pack.outputs.tarball }}
            ${{ steps.pack.outputs.tarball }}.sig
            ${{ steps.pack.outputs.tarball }}.crt
            ${{ steps.pack.outputs.tarball }}.sha256
          fail_on_unmatched_files: true

# Verification (run by downstream users):
#
#   # Download tarball + .sig + .crt from the release
#   cosign verify-blob \
#     --certificate mythos-agent-<version>.tgz.crt \
#     --signature   mythos-agent-<version>.tgz.sig \
#     --certificate-identity-regexp 'https://github.com/mythos-agent/mythos-agent/.github/workflows/sigstore-release\.yml@.*' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#     mythos-agent-<version>.tgz
#
# A scripted verifier ships at scripts/verify-release.sh (lands with the
# threat-model PR).
