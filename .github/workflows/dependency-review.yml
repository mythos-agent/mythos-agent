name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        continue-on-error: true
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # The action emits "Dependency review is not supported on this
          # repository" until Dependabot is explicitly enabled in repo
          # Settings -> Code security and analysis. Non-blocking until
          # then so PRs stay green; the step still runs + surfaces output
          # inside the run log. Flip back to a required check after
          # toggling Dependabot on.
