name: SBOM Generation

# Generates a CycloneDX SBOM for every published release and attaches it to
# the GitHub release. Downstream Manufacturers (per EU CRA) need this to
# satisfy their SBOM coverage obligations when they integrate mythos-agent.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to generate SBOM for"
        required: true
        type: string

permissions:
  contents: write    # upload SBOM to release assets
  id-token: write    # OIDC for cosign signing of the SBOM

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2
        with:
          # Start in audit mode: logs all outbound network calls without
          # blocking. Once a baseline is collected from several successful
          # runs, flip to `egress-policy: block` with an explicit
          # `allowed-endpoints` list. Tracked in docs/security/
          # threat-model.md § S4.
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Generate CycloneDX SBOM
        run: |
          npx --yes @cyclonedx/cyclonedx-npm \
            --output-format JSON \
            --output-file mythos-agent-sbom.cdx.json \
            --spec-version 1.6 \
            --validate

      - name: Generate CycloneDX SBOM (XML)
        run: |
          npx --yes @cyclonedx/cyclonedx-npm \
            --output-format XML \
            --output-file mythos-agent-sbom.cdx.xml \
            --spec-version 1.6 \
            --validate

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
        with:
          cosign-release: "v2.4.1"

      - name: Sign SBOMs (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes \
            --output-signature mythos-agent-sbom.cdx.json.sig \
            --output-certificate mythos-agent-sbom.cdx.json.crt \
            mythos-agent-sbom.cdx.json
          cosign sign-blob --yes \
            --output-signature mythos-agent-sbom.cdx.xml.sig \
            --output-certificate mythos-agent-sbom.cdx.xml.crt \
            mythos-agent-sbom.cdx.xml

      - name: Upload SBOMs to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            mythos-agent-sbom.cdx.json
            mythos-agent-sbom.cdx.json.sig
            mythos-agent-sbom.cdx.json.crt
            mythos-agent-sbom.cdx.xml
            mythos-agent-sbom.cdx.xml.sig
            mythos-agent-sbom.cdx.xml.crt
          fail_on_unmatched_files: true

      - name: Upload SBOM as CI artifact (audit trail)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mythos-agent-sbom-${{ github.event.release.tag_name || inputs.tag }}
          path: |
            mythos-agent-sbom.cdx.json
            mythos-agent-sbom.cdx.xml
          retention-days: 365

# SBOM policy and consumption guidance: docs/security/sbom.md
