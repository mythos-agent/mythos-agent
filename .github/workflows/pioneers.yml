name: Sphinx Mythos Pioneers — Auto-update Leaderboard

# Updates docs/pioneers.md monthly from public contributor stats. The job
# regenerates the auto-managed sections (Founding / Core / Active / Emeritus)
# and opens a PR if anything changed. Maintainer review approves the PR.

on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-pioneers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate Pioneers leaderboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          npx --yes tsx scripts/generate-pioneers.ts \
            --repo "$REPO" \
            --output docs/pioneers.md

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/pioneers-monthly-refresh
          delete-branch: true
          commit-message: "chore(community): refresh sphinx mythos pioneers leaderboard"
          title: "chore(community): monthly pioneers leaderboard refresh"
          body: |
            Automated monthly refresh of `docs/pioneers.md`.

            - Auto-managed sections: Founding / Core / Active / Emeritus
            - Generated by `.github/workflows/pioneers.yml`
            - Source script: `scripts/generate-pioneers.ts`

            Manual sections (intro, tiers, categories, conference list, privacy)
            are preserved between runs. If a contributor was missed or
            mis-categorized, see the "How to claim corrections" section.
          labels: |
            community
            automated
          base: main

# Implementation notes:
#  - scripts/generate-pioneers.ts is created in a follow-up PR alongside this
#    workflow. It uses the GitHub GraphQL API to enumerate merged PRs by
#    author, applies the non-trivial heuristic (lines added > 20 OR
#    `non-trivial` label), categorizes by file paths touched, and rewrites
#    the auto-managed sections of docs/pioneers.md between
#    <!-- pioneers:start --> and <!-- pioneers:end --> markers.
#  - The first run of this workflow will land an empty leaderboard PR; that
#    is correct - founding spots are awarded on first qualifying merge.
